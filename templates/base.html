<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Compass Bot{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
      background: #f0f4f8;
      color: #333;
      min-height: 100vh;
    }
    header {
      background: #5865f2;
      color: white;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.2rem; }
    header nav a {
      color: white;
      text-decoration: none;
      margin-left: 16px;
      font-size: 0.9rem;
      opacity: 0.85;
    }
    header nav a:hover { opacity: 1; }
    .container {
      max-width: 900px;
      margin: 32px auto;
      padding: 0 16px;
    }
    .card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 24px;
      margin-bottom: 20px;
    }
    .card h2 { font-size: 1.1rem; margin-bottom: 16px; color: #444; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.85rem; color: #666; margin-bottom: 4px; }
    .form-group input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.95rem;
    }
    .form-group input:focus {
      outline: none;
      border-color: #5865f2;
      box-shadow: 0 0 0 2px rgba(88,101,242,0.15);
    }
    .btn {
      display: inline-block;
      padding: 9px 20px;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      text-decoration: none;
    }
    .btn-primary { background: #5865f2; color: white; }
    .btn-primary:hover { background: #4752c4; }
    .btn-secondary { background: #eee; color: #444; }
    .btn-secondary:hover { background: #ddd; }
    .alert {
      padding: 10px 14px;
      border-radius: 6px;
      margin-bottom: 14px;
      font-size: 0.9rem;
    }
    .alert-error { background: #fee; color: #c00; border: 1px solid #fcc; }
    .alert-success { background: #efe; color: #060; border: 1px solid #cfc; }
    .alert-info { background: #e8eeff; color: #335; border: 1px solid #b0b8f0; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { background: #f5f5f5; text-align: left; padding: 8px 12px; font-weight: 600; color: #555; }
    td { padding: 8px 12px; border-bottom: 1px solid #eee; }
    tr:last-child td { border-bottom: none; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .badge-ok { background: #e8fce8; color: #2a7c2a; }
    .badge-warn { background: #fff3e0; color: #b76d00; }
    .badge-danger { background: #fee; color: #c00; }
    .progress-bar-bg {
      background: #e0e0e0;
      border-radius: 6px;
      height: 10px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 10px;
      border-radius: 6px;
      background: #5865f2;
    }
    footer {
      text-align: center;
      color: #aaa;
      font-size: 0.8rem;
      padding: 24px;
    }
  </style>
</head>
<body>
  <header>
    <h1>🧭 Compass Bot</h1>
    <nav>
      {% if username %}
        <span style="opacity:0.7;">{{ username }}</span>
        <a href="/compass-bot/logout">ログアウト</a>
      {% else %}
        <a href="/compass-bot/login">ログイン</a>
      {% endif %}
    </nav>
  </header>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  <footer>Compass Bot Dashboard</footer>
</body>
</html>
